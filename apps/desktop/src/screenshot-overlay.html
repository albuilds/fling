<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fling Screenshot</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        color-scheme: dark;
        --accent: #7c5af8;
        --accent-hover: #8d70ff;
        --accent-glow: rgba(124, 90, 248, 0.3);
        --text: #ffffff;
        --muted: rgba(255, 255, 255, 0.68);
        --panel: rgba(16, 16, 24, 0.92);
        --selection: rgba(124, 90, 248, 0.12);
        --selection-border: rgba(160, 138, 255, 0.95);
        --font: -apple-system, "Segoe UI", sans-serif;
      }

      @media (prefers-color-scheme: light) {
        :root:not([data-theme="dark"]) {
          color-scheme: light;
          --accent: #6f4df2;
          --accent-hover: #5838d6;
          --accent-glow: rgba(111, 77, 242, 0.2);
          --text: #292937;
          --muted: rgba(41, 41, 55, 0.72);
          --panel: rgba(255, 255, 255, 0.92);
          --selection: rgba(111, 77, 242, 0.12);
          --selection-border: rgba(111, 77, 242, 0.9);
        }
      }

      :root[data-theme="light"] {
        color-scheme: light;
        --accent: #6f4df2;
        --accent-hover: #5838d6;
        --accent-glow: rgba(111, 77, 242, 0.2);
        --text: #292937;
        --muted: rgba(41, 41, 55, 0.72);
        --panel: rgba(255, 255, 255, 0.92);
        --selection: rgba(111, 77, 242, 0.12);
        --selection-border: rgba(111, 77, 242, 0.9);
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        color: var(--text);
        font-family: var(--font);
        user-select: none;
        cursor: crosshair;
      }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(4, 4, 8, 0.48);
      }

      .hint {
        position: fixed;
        top: 18px;
        left: 50%;
        z-index: 2;
        transform: translateX(-50%);
        padding: 8px 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: var(--panel);
        color: var(--muted);
        font-size: 12px;
        line-height: 1;
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.35);
        pointer-events: none;
        white-space: nowrap;
      }

      .selection {
        position: fixed;
        z-index: 3;
        display: none;
        min-width: 2px;
        min-height: 2px;
        border: 2px solid var(--selection-border);
        background: var(--selection);
        box-shadow:
          0 0 0 9999px rgba(4, 4, 8, 0.24),
          0 0 0 1px rgba(255, 255, 255, 0.16) inset;
        pointer-events: none;
      }

      .selection.visible {
        display: block;
      }

      .selection::before,
      .selection::after {
        content: "";
        position: absolute;
        background: rgba(255, 255, 255, 0.52);
      }

      .selection::before {
        top: 50%;
        left: 0;
        right: 0;
        height: 1px;
        transform: translateY(-50%);
      }

      .selection::after {
        top: 0;
        bottom: 0;
        left: 50%;
        width: 1px;
        transform: translateX(-50%);
      }

      .toolbar {
        position: fixed;
        z-index: 4;
        display: none;
        align-items: center;
        gap: 8px;
        padding: 7px;
        border: 1px solid rgba(255, 255, 255, 0.11);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.42);
        cursor: default;
      }

      .toolbar.visible {
        display: flex;
      }

      .capture-options {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 0 2px;
      }

      .capture-option {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        height: 28px;
        padding: 0 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
        font: 600 11px/1 var(--font);
        cursor: pointer;
      }

      .capture-option:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.1);
      }

      .capture-option input {
        width: 12px;
        height: 12px;
        accent-color: var(--accent);
        cursor: pointer;
      }

      .capture-option.disabled {
        opacity: 0.42;
        cursor: not-allowed;
      }

      .capture-option.disabled input {
        cursor: not-allowed;
      }

      button {
        height: 32px;
        border: 0;
        border-radius: 7px;
        padding: 0 14px;
        color: var(--text);
        font: 600 12px/1 var(--font);
        cursor: pointer;
      }

      .screenshot-button {
        background: var(--accent);
        box-shadow: 0 0 18px var(--accent-glow);
      }

      .screenshot-button:hover {
        background: var(--accent-hover);
      }

      .screenshot-button:disabled {
        opacity: 0.52;
        cursor: not-allowed;
        box-shadow: none;
      }

      .cancel-button {
        background: rgba(255, 255, 255, 0.08);
        color: var(--muted);
      }

      .cancel-button:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.12);
      }

      .status {
        display: none;
        color: var(--muted);
        font-size: 12px;
        padding: 0 6px;
      }

      .status.visible {
        display: inline;
      }

      @media (prefers-color-scheme: light) {
        :root:not([data-theme="dark"]) .overlay {
          background: rgba(245, 245, 250, 0.42);
        }

        :root:not([data-theme="dark"]) .hint,
        :root:not([data-theme="dark"]) .toolbar {
          border-color: rgba(18, 18, 28, 0.12);
          box-shadow: 0 16px 40px rgba(35, 33, 52, 0.16);
        }

        :root:not([data-theme="dark"]) .capture-option,
        :root:not([data-theme="dark"]) .cancel-button {
          background: rgba(18, 18, 28, 0.05);
          border-color: rgba(18, 18, 28, 0.1);
        }

        :root:not([data-theme="dark"]) .capture-option:hover,
        :root:not([data-theme="dark"]) .cancel-button:hover {
          background: rgba(18, 18, 28, 0.08);
        }
      }

      :root[data-theme="light"] .overlay {
        background: rgba(245, 245, 250, 0.42);
      }

      :root[data-theme="light"] .hint,
      :root[data-theme="light"] .toolbar {
        border-color: rgba(18, 18, 28, 0.12);
        box-shadow: 0 16px 40px rgba(35, 33, 52, 0.16);
      }

      :root[data-theme="light"] .capture-option,
      :root[data-theme="light"] .cancel-button {
        background: rgba(18, 18, 28, 0.05);
        border-color: rgba(18, 18, 28, 0.1);
      }

      :root[data-theme="light"] .capture-option:hover,
      :root[data-theme="light"] .cancel-button:hover {
        background: rgba(18, 18, 28, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="overlay" id="overlay"></div>
    <div class="hint">Drag to select a screenshot area</div>
    <div class="selection" id="selection"></div>
    <div class="toolbar" id="toolbar">
      <div class="capture-options" aria-label="Screenshot options">
        <label class="capture-option">
          <input id="copyOption" type="checkbox" />
          Copy
        </label>
        <label class="capture-option">
          <input id="saveOption" type="checkbox" checked />
          Save
        </label>
        <label
          class="capture-option disabled"
          title="Server upload is coming later"
        >
          <input id="uploadOption" type="checkbox" disabled />
          Upload
        </label>
      </div>
      <button class="screenshot-button" type="button" id="screenshotButton">
        screenshot
      </button>
      <button class="cancel-button" type="button" id="cancelButton">
        Cancel
      </button>
      <span class="status" id="status">Saving...</span>
    </div>

    <script>
      const overlay = document.getElementById("overlay");
      const selection = document.getElementById("selection");
      const toolbar = document.getElementById("toolbar");
      const status = document.getElementById("status");
      const screenshotButton = document.getElementById("screenshotButton");
      const cancelButton = document.getElementById("cancelButton");
      const copyOption = document.getElementById("copyOption");
      const saveOption = document.getElementById("saveOption");
      const uploadOption = document.getElementById("uploadOption");
      const screenshotSound = new Audio("assets/sounds/screenshot-click.mp3");
      screenshotSound.preload = "auto";

      let startX = 0;
      let startY = 0;
      let isDragging = false;
      let selectedRect = null;

      const DEFAULT_SCREENSHOT_SETTINGS = {
        copyToClipboard: false,
        saveLocally: true,
        uploadToServer: false,
      };

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function getRect(currentX, currentY) {
        const left = Math.min(startX, currentX);
        const top = Math.min(startY, currentY);
        const width = Math.abs(currentX - startX);
        const height = Math.abs(currentY - startY);
        return { left, top, width, height };
      }

      function setSelectionRect(rect) {
        selection.style.left = `${rect.left}px`;
        selection.style.top = `${rect.top}px`;
        selection.style.width = `${rect.width}px`;
        selection.style.height = `${rect.height}px`;
      }

      function setToolbarPosition(rect) {
        const gap = 10;
        toolbar.classList.add("visible");

        const toolbarRect = toolbar.getBoundingClientRect();
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;
        const below = rect.top + rect.height + gap;
        const top =
          below + toolbarRect.height <= viewportHeight
            ? below
            : Math.max(gap, rect.top - toolbarRect.height - gap);
        const centeredLeft = rect.left + rect.width / 2 - toolbarRect.width / 2;

        toolbar.style.left = `${clamp(centeredLeft, gap, viewportWidth - toolbarRect.width - gap)}px`;
        toolbar.style.top = `${clamp(top, gap, viewportHeight - toolbarRect.height - gap)}px`;
      }

      function hideToolbarStatus() {
        status.classList.remove("visible");
      }

      function playScreenshotSound() {
        screenshotSound.currentTime = 0;
        screenshotSound.play().catch(() => {});
      }

      function getScreenshotOptions() {
        return {
          copyToClipboard: copyOption.checked,
          saveLocally: saveOption.checked,
          uploadToServer: uploadOption.checked,
        };
      }

      function updateScreenshotButtonState() {
        screenshotButton.disabled = !copyOption.checked && !saveOption.checked;
      }

      function isKeyboardControlTarget(target) {
        return target?.closest?.("button, input, select, textarea, [contenteditable]");
      }

      function captureScreenshot() {
        if (isDragging || screenshotButton.disabled) return;

        playScreenshotSound();
        screenshotButton.disabled = true;
        status.textContent = "Capturing...";
        status.classList.add("visible");
        window.flingScreenshot?.requestScreenshot?.(
          selectedRect,
          getScreenshotOptions(),
        );
      }

      async function loadScreenshotSettings() {
        const settings = await window.flingSettings?.get?.();
        applyTheme(settings?.appearance?.theme ?? "system");
        const screenshotSettings = {
          ...DEFAULT_SCREENSHOT_SETTINGS,
          ...settings?.screenshot,
        };

        copyOption.checked = screenshotSettings.copyToClipboard;
        saveOption.checked = screenshotSettings.saveLocally;
        uploadOption.checked = false;
        updateScreenshotButtonState();
      }

      function applyTheme(theme) {
        document.documentElement.dataset.theme =
          theme === "light" || theme === "dark" ? theme : "system";
      }

      overlay.addEventListener("pointerdown", (event) => {
        if (event.button !== 0) return;
        isDragging = true;
        startX = event.clientX;
        startY = event.clientY;
        selectedRect = null;
        toolbar.classList.remove("visible");
        hideToolbarStatus();
        selection.classList.add("visible");
        setSelectionRect({ left: startX, top: startY, width: 0, height: 0 });
        overlay.setPointerCapture(event.pointerId);
      });

      overlay.addEventListener("pointermove", (event) => {
        if (!isDragging) return;
        const rect = getRect(event.clientX, event.clientY);
        setSelectionRect(rect);
      });

      overlay.addEventListener("pointerup", (event) => {
        if (!isDragging) return;
        isDragging = false;
        overlay.releasePointerCapture(event.pointerId);

        const rect = getRect(event.clientX, event.clientY);
        if (rect.width < 8 || rect.height < 8) {
          selection.classList.remove("visible");
          return;
        }

        selectedRect = rect;
        setSelectionRect(rect);
        setToolbarPosition(rect);
      });

      screenshotButton.addEventListener("click", captureScreenshot);

      cancelButton.addEventListener("click", () => {
        window.flingScreenshot?.closeOverlay?.();
      });

      copyOption.addEventListener("change", updateScreenshotButtonState);
      saveOption.addEventListener("change", updateScreenshotButtonState);

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          window.flingScreenshot?.closeOverlay?.();
        } else if (
          event.key === "Enter" &&
          !isKeyboardControlTarget(event.target)
        ) {
          event.preventDefault();
          captureScreenshot();
        }
      });

      window.flingScreenshot?.onPending?.(() => {
        status.textContent = "Capturing...";
        status.classList.add("visible");
      });

      window.flingScreenshot?.onSaved?.((_event, savedPath) => {
        status.textContent = `Saved to ${savedPath}`;
        status.classList.add("visible");
      });

      window.flingScreenshot?.onError?.(() => {
        screenshotButton.disabled = false;
        status.textContent = "Could not save screenshot";
        status.classList.add("visible");
      });

      loadScreenshotSettings();
    </script>
  </body>
</html>
